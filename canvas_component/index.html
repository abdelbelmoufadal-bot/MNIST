<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.3.0/dist/streamlit-component-lib.js"></script>
  <style>
    body {
      margin: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #canvas-container {
      position: relative;
      background: #090D16;
      border: 2px solid #334155;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      padding: 8px;
      margin-bottom: 12px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    #canvas-container:hover {
      border-color: #00F2FE;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }
    #canvas {
      background: #000000;
      border-radius: 8px;
      cursor: crosshair;
      display: block;
    }
    .button-group {
      display: flex;
      gap: 12px;
    }
    button {
      border: none;
      color: #090D16;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    #clear {
      background: rgba(255, 255, 255, 0.1);
      color: #F1F5F9;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    #clear:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #F1F5F9;
    }
    #classify {
      background: linear-gradient(90deg, #00F2FE 0%, #4FACFE 100%);
      box-shadow: 0 4px 10px rgba(0, 242, 254, 0.3);
    }
    #classify:hover {
      box-shadow: 0 6px 15px rgba(0, 242, 254, 0.5);
      transform: translateY(-1px);
    }
    #classify:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas" width="280" height="280"></canvas>
  </div>
  <div class="button-group">
    <button id="clear">Effacer</button>
    <button id="classify">Classer le Chiffre</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Set drawing stroke preferences (20px brush is good for 280x280 -> 28x28 resizing)
    ctx.lineWidth = 20;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'white';

    let drawing = false;

    // Mouse drawing events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    // Touch support for mobile devices
    canvas.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      startDrawing(touch);
      e.preventDefault();
    });
    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      draw(touch);
      e.preventDefault();
    });
    canvas.addEventListener('touchend', (e) => {
      stopDrawing();
      e.preventDefault();
    });

    function startDrawing(e) {
      drawing = true;
      ctx.beginPath();
      const rect = canvas.getBoundingClientRect();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function draw(e) {
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
    }

    function stopDrawing() {
      drawing = false;
    }

    // Clear Canvas
    document.getElementById('clear').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Notify Streamlit of the clear action
      Streamlit.setComponentValue(null);
    });

    // Send drawing to Streamlit
    document.getElementById('classify').addEventListener('click', () => {
      // 1. Create a 28x28 canvas to resize our high-res canvas
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = 28;
      tempCanvas.height = 28;
      const tempCtx = tempCanvas.getContext('2d');
      
      // Draw standard scaling
      tempCtx.drawImage(canvas, 0, 0, 28, 28);
      
      const imgData = tempCtx.getImageData(0, 0, 28, 28);
      const pixels = [];
      
      // Convert RGBA to Grayscale and Normalize (0 to 1)
      for (let i = 0; i < imgData.data.length; i += 4) {
        const val = imgData.data[i]; // R (white brush means R=G=B=255)
        pixels.push(val / 255.0);
      }
      
      // Send array of 784 normalized pixel values back to python
      Streamlit.setComponentValue(pixels);
    });

    // Instruct Streamlit height
    Streamlit.setFrameHeight(360);
  </script>
</body>
</html>
